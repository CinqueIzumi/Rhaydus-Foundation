name: Publish

# Builds and tests on every push/PR, and publishes all foundation artifacts to Maven Central (Central
# Portal) when a version tag (v*) is pushed. The version published is whatever foundation.version is
# set to in gradle.properties — tag and property should agree for a release. The build job also runs
# `verifyPluginVersion` (via `check`), which fails if the rhaydus-kotlin Claude plugin's version in
# plugin.json diverges from foundation.version — the two are locked and must move together.
#
# Runs on macOS because the KMP modules have iOS (Kotlin/Native) targets that cannot build on Linux.
# Standard runners (incl. macOS) are free for public repositories.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions) BEFORE the publish job can work:
#   MAVEN_CENTRAL_USERNAME / MAVEN_CENTRAL_PASSWORD  — Central Portal user token
#   SIGNING_KEY                                      — ASCII-armored PGP private key (real newlines)
#   SIGNING_KEY_ID / SIGNING_KEY_PASSWORD            — key id (e.g. 9A60CD44) + passphrase

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest   # KMP iOS targets (Kotlin/Native) require macOS; Linux cannot compile them
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v6
      - name: Build and test
        run: ./gradlew build --stacktrace

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest   # KMP iOS targets (Kotlin/Native) require macOS; Linux cannot compile them
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v6
      - name: Publish to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral --stacktrace --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
